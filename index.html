<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AI简历优化器 | 智能优化+职位定制</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* 样式与之前完全相同，此处省略（实际使用请复制之前完整样式） */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fb; padding: 12px; transition: background 0.3s; }
        body.dark { background: #1a1a1c; color: #e8e8ec; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
        h1 { font-size: 1.4rem; font-weight: 600; background: linear-gradient(135deg, #2563eb, #7c3aed); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .badge { background: #e0e7ff; padding: 4px 8px; border-radius: 20px; font-size: 0.7rem; color: #2563eb; }
        .theme-toggle, .vip-btn { background: #e4e4e7; border: none; padding: 8px 12px; border-radius: 40px; cursor: pointer; font-size: 0.8rem; }
        .vip-btn { background: linear-gradient(135deg, #f59e0b, #ef4444); color: white; }
        .card { background: white; border-radius: 20px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        body.dark .card { background: #252527; }
        label { font-weight: 500; display: block; margin-bottom: 6px; font-size: 0.85rem; }
        textarea, input, select { width: 100%; padding: 12px; border-radius: 14px; border: 1px solid #ddd; font-family: inherit; font-size: 1rem; background: white; }
        body.dark textarea, body.dark input, body.dark select { background: #1e1e20; border-color: #3a3a3e; color: #e8e8ec; }
        button { background: #2563eb; color: white; border: none; padding: 12px 18px; border-radius: 40px; font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.97); }
        button:disabled { background: #9ca3af; cursor: not-allowed; }
        .result-area { background: #f9fafb; border-radius: 16px; padding: 16px; white-space: pre-wrap; line-height: 1.5; border-left: 4px solid #2563eb; min-height: 120px; max-height: 300px; overflow-y: auto; font-size: 0.85rem; }
        body.dark .result-area { background: #1b1b1d; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
        .btn-group button { flex: 1; min-width: 80px; padding: 10px; font-size: 0.8rem; }
        .score-card { background: linear-gradient(135deg, #2563eb10, #7c3aed10); border-radius: 16px; padding: 12px; margin-top: 12px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
        .score-value { font-size: 1.6rem; font-weight: bold; background: linear-gradient(135deg, #2563eb, #7c3aed); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .template-grid { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
        .template-card { border: 2px solid #e2e8f0; border-radius: 40px; padding: 6px 12px; cursor: pointer; text-align: center; transition: 0.2s; background: white; font-size: 0.8rem; }
        .template-card.selected { border-color: #2563eb; background: #2563eb10; }
        .progress-steps { display: flex; gap: 8px; justify-content: center; margin: 16px 0; flex-wrap: wrap; }
        .step { display: flex; flex-direction: column; align-items: center; gap: 4px; opacity: 0.5; font-size: 0.7rem; }
        .step.active { opacity: 1; }
        .step .circle { width: 28px; height: 28px; border-radius: 50%; background: #e4e4e7; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.8rem; }
        .step.active .circle { background: #2563eb; color: white; }
        .step.done .circle { background: #10b981; color: white; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .remaining-count { font-size: 0.7rem; background: #e4e4e7; padding: 4px 8px; border-radius: 20px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; border-radius: 24px; padding: 20px; max-width: 350px; width: 90%; text-align: center; }
        body.dark .modal-content { background: #252527; }
        .feedback-text { font-size: 0.75rem; color: #2563eb; margin-top: 8px; text-align: center; }
        .history-item { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 0.8rem; }
        body.dark .history-item { border-color: #3a3a3e; }
        @media (max-width: 640px) {
            body { padding: 8px; }
            .container { display: flex; flex-direction: column; }
            .card { padding: 12px; }
            h1 { font-size: 1.2rem; }
            button { padding: 10px 16px; font-size: 0.85rem; }
            .btn-group button { min-width: 70px; }
            .result-area { font-size: 0.8rem; }
            .score-value { font-size: 1.4rem; }
            .progress-steps { gap: 4px; }
            .step .circle { width: 24px; height: 24px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div><h1>📄 简历优化器 Pro Max</h1><span class="badge">多版本对比 | 匹配评分 | 面试题 | 职位定制</span></div>
        <div style="display: flex; gap: 8px;">
            <span id="vipBadge" class="remaining-count">普通用户</span>
            <button id="showVipBtn" class="vip-btn">🎁 VIP激活</button>
            <button class="theme-toggle" id="themeToggle">🌙</button>
        </div>
    </div>

    <div id="limitWarning" class="card" style="display:none; background:#fef3c7; color:#92400e;"></div>

    <div class="card">
        <label>📝 你的个人经历（原始简历）</label>
        <textarea id="resumeInput" rows="5" placeholder="例如：在一家公司做运营，负责公众号，每天发文章，粉丝涨了一些。还做过活动，效果还行。"></textarea>
        <label style="margin-top:12px;">🎯 目标岗位</label>
        <input type="text" id="jobTarget" placeholder="产品经理 / 新媒体运营 / Java开发..." value="新媒体运营">
    </div>

    <!-- 职位任职要求定制区域 -->
    <div class="card">
        <label>📋 职位任职要求（粘贴招聘要求）</label>
        <textarea id="jobRequirements" rows="3" placeholder="例如：&#10;1、大专及以上学历，市场营销专业优先；&#10;2、具备3年以上零售管理经验..."></textarea>
        <button id="customizeBtn" style="background: #10b981; margin-top: 8px;">🎯 根据任职要求生成定制简历</button>
    </div>

    <div class="card">
        <label>🎨 选择简历模板（VIP专享）</label>
        <div class="template-grid" id="templateGrid">
            <div class="template-card" data-template="simple">📄 简约白</div>
            <div class="template-card" data-template="business">💼 商务蓝</div>
            <div class="template-card" data-template="creative">🎨 创意橙</div>
        </div>
        <div id="templateLockMsg" style="font-size:0.7rem; color:#999; margin-top:8px;">🔒 VIP用户可解锁模板样式</div>
    </div>

    <div style="text-align: center;">
        <button id="optimizeBtn" style="padding: 12px 28px; font-size: 1rem;">✨ 开始优化（通用优化）</button>
    </div>

    <!-- 进度反馈 -->
    <div id="progressCard" class="card" style="display:none;">
        <div class="progress-steps">
            <div class="step" id="step1"><div class="circle">1</div><span>优化简历</span></div>
            <div class="step" id="step2"><div class="circle">2</div><span>匹配评分</span></div>
            <div class="step" id="step3"><div class="circle">3</div><span>生成面试题</span></div>
        </div>
        <div id="progressText" class="feedback-text">准备就绪</div>
    </div>

    <div class="card">
        <div class="flex-between">
            <label>✨ 优化结果</label>
            <button id="clearHistoryBtn" style="background:#ef4444; padding:6px 12px;">🗑️ 清空历史</button>
        </div>
        <div class="result-area" id="resultText">点击上方按钮，AI将帮你优化简历。</div>
        
        <div id="scoreCard" class="score-card" style="display:none;">
            <div><span>📊 岗位匹配度</span><div class="score-value" id="matchScore">--</div></div>
            <div id="scoreDetail" style="font-size:0.8rem;"></div>
        </div>
        <div id="interviewCard" class="score-card" style="display:none;">
            <div style="width:100%"><span>🎯 你可能被问到的面试题</span><div id="interviewQuestions" style="margin-top:10px; font-size:0.85rem;"></div></div>
        </div>
        
        <div class="btn-group">
            <button id="copyBtn">📋 复制</button>
            <button id="downloadWordBtn">📄 下载 Word</button>
            <button id="downloadPdfBtn">📑 下载 PDF</button>
            <button id="toTemplateBtn" style="background: #8b5cf6;">📄 生成精美简历模板</button>
        </div>
    </div>

    <div class="card">
        <label>📜 历史记录（点击恢复）</label>
        <div id="historyList" style="max-height:200px; overflow-y:auto; font-size:0.85rem;">暂无历史记录</div>
    </div>

    <div class="footer-tip" style="text-align:center; font-size:0.7rem; color:#aaa;">💡 免费版每日3次 | 多版本对比 | 自动生成面试题 | 职位定制</div>
</div>

<!-- VIP激活弹窗 -->
<div id="vipModal" class="modal">
    <div class="modal-content">
        <h3>🎁 输入VIP激活码</h3>
        <input type="text" id="vipCodeInput" placeholder="请输入客服发给您的激活码" style="margin:16px 0;">
        <button id="confirmVipBtn" style="background:#f59e0b; width:100%;">立即激活</button>
        <button id="closeVipBtn" style="background:#999; width:100%; margin-top:8px;">关闭</button>
        <p style="font-size:12px; margin-top:16px;">没有激活码？<a href="vip.html" target="_blank">点击购买 ¥9.9/月</a></p>
    </div>
</div>

<script>
    // ========== 配置 ==========
    const API_KEY = "sk-c125e8543b3f4e8b9ce496c899d92296";
    let DAILY_LIMIT = 3;
    let isVIP = localStorage.getItem('isVIP') === 'true';
    let todayCount = 0;
    let lastDate = localStorage.getItem('lastDate') || '';
    let versions = [];
    let currentVersion = 0;
    let selectedTemplate = 'simple';
    const VIP_CODE = "VIP123";  // 固定VIP激活码

    function checkVIPExpiry() {
        const expiry = localStorage.getItem('vipExpiry');
        if (expiry && new Date(expiry) < new Date()) {
            localStorage.removeItem('isVIP');
            isVIP = false;
        }
    }
    checkVIPExpiry();

    function initLimit() {
        const today = new Date().toDateString();
        if (lastDate !== today) { todayCount = 0; localStorage.setItem('lastDate', today); localStorage.setItem('todayCount', '0'); }
        else { todayCount = parseInt(localStorage.getItem('todayCount') || '0'); }
        document.getElementById('vipBadge').innerHTML = isVIP ? '👑 VIP会员' : '普通用户';
        if (!isVIP && todayCount >= DAILY_LIMIT) {
            document.getElementById('limitWarning').style.display = 'block';
            document.getElementById('limitWarning').innerHTML = '⚠️ 今日免费次数已用完，请升级VIP或明天再来！';
            document.getElementById('optimizeBtn').disabled = true;
            document.getElementById('customizeBtn').disabled = true;
        } else {
            document.getElementById('limitWarning').style.display = 'none';
            document.getElementById('optimizeBtn').disabled = false;
            document.getElementById('customizeBtn').disabled = false;
        }
        document.getElementById('templateLockMsg').innerHTML = isVIP ? '✅ VIP用户已解锁模板样式' : '🔒 VIP用户可解锁模板样式，升级后优化结果将套用模板格式';
    }
    function consumeLimit() { if (!isVIP) { todayCount++; localStorage.setItem('todayCount', todayCount); initLimit(); } }

    // VIP弹窗
    document.getElementById('showVipBtn').onclick = () => document.getElementById('vipModal').style.display = 'flex';
    document.getElementById('closeVipBtn').onclick = () => document.getElementById('vipModal').style.display = 'none';
    document.getElementById('confirmVipBtn').onclick = () => {
        const inputCode = document.getElementById('vipCodeInput').value.trim();
        if (!inputCode) { alert('请输入激活码'); return; }
        if (inputCode === VIP_CODE) {
            localStorage.setItem('isVIP', 'true');
            isVIP = true;
            alert('🎉 激活成功！刷新页面后生效');
            location.reload();
        } else {
            alert('❌ 激活码无效，请检查后重新输入');
        }
    };

    // 模板选择
    document.querySelectorAll('.template-card').forEach(card => {
        card.onclick = () => {
            if (!isVIP) { alert('请先升级VIP解锁模板'); return; }
            document.querySelectorAll('.template-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            selectedTemplate = card.dataset.template;
            applyTemplate();
        };
    });
    function applyTemplate() {
        if (!isVIP) return;
        let content = document.getElementById('resultText').innerText;
        if (selectedTemplate === 'business') content = '【商务版】\n' + content;
        else if (selectedTemplate === 'creative') content = '✨ 创意版 ✨\n' + content;
        document.getElementById('resultText').innerText = content;
    }

    function updateProgress(step, text) {
        document.getElementById('progressCard').style.display = 'block';
        for(let i=1;i<=3;i++) {
            const stepDiv = document.getElementById(`step${i}`);
            if (i < step) { stepDiv.classList.add('done'); stepDiv.classList.remove('active'); stepDiv.querySelector('.circle').innerText = '✓'; }
            else if (i === step) { stepDiv.classList.add('active'); stepDiv.classList.remove('done'); stepDiv.querySelector('.circle').innerText = i; }
            else { stepDiv.classList.remove('active','done'); stepDiv.querySelector('.circle').innerText = i; }
        }
        document.getElementById('progressText').innerText = text;
    }

    async function callAI(prompt) {
        const res = await fetch("https://api.deepseek.com/v1/chat/completions", {
            method: "POST", headers: { "Content-Type": "application/json", "Authorization": "Bearer " + API_KEY },
            body: JSON.stringify({ model: "deepseek-chat", messages: [{ role: "user", content: prompt }], max_tokens: 1500 })
        });
        if (!res.ok) { const err = await res.json(); throw new Error(err.error?.message || "请求失败"); }
        const data = await res.json();
        return data.choices[0].message.content;
    }

    async function generateNewVersion(optimized, score, scoreDetail, interview) {
        if (!optimized) optimized = "优化结果为空，请重试";
        if (!score) score = 0;
        if (!scoreDetail) scoreDetail = "暂无评语";
        if (!interview) interview = "暂无面试题";
        
        let finalContent = optimized;
        if (isVIP) finalContent = `【${selectedTemplate === 'business' ? '商务版' : selectedTemplate === 'creative' ? '创意版' : '简约版'}】\n\n${optimized}`;
        const job = document.getElementById('jobTarget').value.trim();
        versions.push({ content: finalContent, score, scoreDetail, interview, job, timestamp: new Date().toISOString() });
        localStorage.setItem('resumeVersions', JSON.stringify(versions));
        currentVersion = versions.length-1;
        document.getElementById('resultText').innerText = finalContent;
        document.getElementById('scoreCard').style.display = 'flex';
        document.getElementById('matchScore').innerHTML = score;
        document.getElementById('scoreDetail').innerHTML = scoreDetail;
        document.getElementById('interviewCard').style.display = 'block';
        document.getElementById('interviewQuestions').innerHTML = interview.replace(/\n/g,'<br>');
        renderHistoryList();
    }

    async function fullOptimize() {
        const original = document.getElementById('resumeInput').value.trim();
        const job = document.getElementById('jobTarget').value.trim();
        if (!original || !job) { alert("请填写完整"); return; }
        updateProgress(1, "正在优化简历...");
        const optimizePrompt = `请优化以下简历，目标岗位「${job}」。要求：专业措辞、突出数据。直接输出结果：\n${original}`;
        const optimized = await callAI(optimizePrompt);
        updateProgress(2, "正在计算匹配度...");
        const scorePrompt = `给这份简历与岗位「${job}」的匹配度打分（0-100），格式：分数:数字;评语:简短说明。\n${optimized}`;
        const scoreText = await callAI(scorePrompt);
        const scoreMatch = scoreText.match(/分数[:：](\d+)/);
        const score = scoreMatch ? parseInt(scoreMatch[1]) : 75;
        const detailMatch = scoreText.match(/评语[:：](.+)/);
        const scoreDetail = detailMatch ? detailMatch[1] : '简历与岗位匹配度良好';
        updateProgress(3, "正在生成面试题...");
        const interviewPrompt = `根据这份简历和目标岗位「${job}」，生成5个面试官可能会问的问题，每个问题后附简短回答思路。格式：1.问题\n回答思路：xxx\n\n${optimized}`;
        let interview = await callAI(interviewPrompt);
        if (!interview) interview = "暂无面试题";
        await generateNewVersion(optimized, score, scoreDetail, interview);
        document.getElementById('progressCard').style.display = 'none';
    }

    async function customizeByRequirements() {
        const original = document.getElementById('resumeInput').value.trim();
        const job = document.getElementById('jobTarget').value.trim();
        const requirements = document.getElementById('jobRequirements').value.trim();
        if (!original || !job || !requirements) { alert("请填写完整"); return; }
        if (!isVIP && todayCount >= DAILY_LIMIT) { alert("今日免费次数已用完，请升级VIP"); return; }
        consumeLimit();

        updateProgress(1, "正在分析任职要求...");
        const prompt = `请根据以下职位要求，帮我优化我的简历，使我的经历更匹配该职位。职位名称：${job}。任职要求：${requirements}。我的原始简历：${original}。要求：突出与要求匹配的技能和成果，保留真实经历，不要编造，输出优化后的简历内容。`;
        try {
            const customized = await callAI(prompt);
            document.getElementById('resultText').innerText = customized;
            versions.push({ content: customized, score: null, scoreDetail: null, interview: null, job: job + "(定制)", timestamp: new Date().toISOString() });
            localStorage.setItem('resumeVersions', JSON.stringify(versions));
            renderHistoryList();
            updateProgress(3, "定制完成");
            setTimeout(() => document.getElementById('progressCard').style.display = 'none', 1500);
        } catch (err) {
            alert("定制失败：" + err.message);
            document.getElementById('progressCard').style.display = 'none';
        }
    }

    function renderHistoryList() {
        const container = document.getElementById('historyList');
        if (!versions.length) { container.innerHTML = '<div style="color:#999; text-align:center; padding:20px;">暂无历史记录</div>'; return; }
        container.innerHTML = versions.map((v,i)=>`<div class="history-item" style="padding:10px; border-bottom:1px solid #eee; cursor:pointer;" onclick="showVersion(${i})"><b>版本${i+1}</b> - ${v.job}<br><span style="font-size:0.75rem;">${(v.content || "").substring(0,60)}...</span></div>`).join('');
    }

    window.showVersion = function(i) { 
        currentVersion = i;
        const v = versions[i];
        document.getElementById('resultText').innerText = v.content || "无内容";
        if (v.score) {
            document.getElementById('scoreCard').style.display = 'flex';
            document.getElementById('matchScore').innerHTML = v.score;
            document.getElementById('scoreDetail').innerHTML = v.scoreDetail || "";
            if (v.interview) {
                document.getElementById('interviewCard').style.display = 'block';
                document.getElementById('interviewQuestions').innerHTML = v.interview.replace(/\n/g,'<br>');
            } else {
                document.getElementById('interviewCard').style.display = 'none';
            }
        } else {
            document.getElementById('scoreCard').style.display = 'none';
            document.getElementById('interviewCard').style.display = 'none';
        }
    };

    // 生成精美简历模板按钮（已移除VIP限制，所有用户均可使用）
    document.getElementById('toTemplateBtn').onclick = () => {
        window.open('resume_template.html', '_blank');
    };

    // 下载 Word 和 PDF 保留VIP限制（可根据需要调整）
    document.getElementById('downloadWordBtn').onclick = () => {
        if (!isVIP) {
            alert('下载Word功能为VIP专属，请升级VIP（¥9.9/月）');
            return;
        }
        const content = document.getElementById('resultText').innerText;
        if (!content || content.includes("点击上方按钮")) { alert("请先优化简历"); return; }
        const blob = new Blob([content], { type: 'application/msword' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `resume_${Date.now()}.doc`;
        link.click();
        URL.revokeObjectURL(link.href);
    };

    document.getElementById('downloadPdfBtn').onclick = () => {
        if (!isVIP) {
            alert('下载PDF功能为VIP专属，请升级VIP（¥9.9/月）');
            return;
        }
        const content = document.getElementById('resultText').innerText;
        if (!content || content.includes("点击上方按钮")) { alert("请先优化简历"); return; }
        const win = window.open('', '_blank');
        win.document.write(`<html><head><title>Resume</title><style>body{font-family:Arial;padding:40px}</style></head><body><pre>${content}</pre></body></html>`);
        win.print();
    };

    document.getElementById('optimizeBtn').onclick = async () => {
        if (!isVIP && todayCount >= DAILY_LIMIT) { alert("今日免费次数已用完，请升级VIP"); return; }
        consumeLimit();
        try { await fullOptimize(); } catch(err) { alert("优化失败："+err.message); document.getElementById('progressCard').style.display = 'none'; }
    };
    document.getElementById('customizeBtn').onclick = async () => {
        if (!isVIP && todayCount >= DAILY_LIMIT) { alert("今日免费次数已用完，请升级VIP"); return; }
        await customizeByRequirements();
    };
    document.getElementById('clearHistoryBtn').onclick = () => { if(confirm("清空所有历史？")) { versions=[]; localStorage.removeItem('resumeVersions'); renderHistoryList(); document.getElementById('resultText').innerText="点击上方按钮开始优化"; document.getElementById('scoreCard').style.display='none'; document.getElementById('interviewCard').style.display='none'; } };
    document.getElementById('copyBtn').onclick = async () => { await navigator.clipboard.writeText(document.getElementById('resultText').innerText); alert("已复制"); };

    const themeToggle = document.getElementById('themeToggle'), body = document.body;
    const setTheme = (t) => { if(t==='dark'){ body.classList.add('dark'); themeToggle.innerHTML='☀️'; } else { body.classList.remove('dark'); themeToggle.innerHTML='🌙'; } };
    setTheme(localStorage.getItem('theme')||'light');
    themeToggle.onclick = () => { const newTheme = body.classList.contains('dark') ? 'light' : 'dark'; setTheme(newTheme); localStorage.setItem('theme', newTheme); };

    initLimit();
    const saved = localStorage.getItem('resumeVersions');
    if(saved) { versions = JSON.parse(saved); renderHistoryList(); }
</script>
</body>
</html>
